name: terraform

on:
  push:
    branches:
      - main
    paths:
      - "terraform/**"
      - ".github/workflows/terraform.yml"

jobs:
  terraform-apply:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: terraform

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Write SA key
        run: echo '${{ secrets.YC_SA_JSON_KEY }}' > ../sa-key.json

      - name: Create backend.hcl
        run: |
          cat > backend.hcl <<EOF
          bucket     = "${{ secrets.YC_TF_BACKEND_BUCKET }}"
          key        = "terraform/terraform.tfstate"
          region     = "ru-central1"
          endpoint   = "https://storage.yandexcloud.net"
          access_key = "${{ secrets.YC_TF_BACKEND_ACCESS_KEY }}"
          secret_key = "${{ secrets.YC_TF_BACKEND_SECRET_KEY }}"
          skip_region_validation      = true
          skip_credentials_validation = true
          skip_requesting_account_id  = true
          EOF

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform init
        run: terraform init -reconfigure -backend-config=backend.hcl

      - name: Terraform apply
        run: terraform apply -auto-approve