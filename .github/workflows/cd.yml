name: cd

on:
  push:
    tags:
      - "v*"

jobs:
  release-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Write SA key
        run: echo '${{ secrets.YC_SA_JSON_KEY }}' > key.json

      - name: Docker login
        run: cat key.json | docker login --username json_key --password-stdin cr.yandex

      - name: Build image
        run: docker build -t cr.yandex/${{ secrets.YC_REGISTRY_ID }}/nginx-test:${GITHUB_REF_NAME} ./app

      - name: Push image
        run: docker push cr.yandex/${{ secrets.YC_REGISTRY_ID }}/nginx-test:${GITHUB_REF_NAME}

      - name: Set kubeconfig
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBE_CONFIG_DATA }}" | base64 -d > ~/.kube/config
          chmod 600 ~/.kube/config

      - name: Deploy namespace
        run: kubectl apply -f k8s/namespaces/app.yaml

      - name: Deploy application
        run: |
          sed -e "s|REGISTRY_ID|${{ secrets.YC_REGISTRY_ID }}|g" \
              -e "s|IMAGE_TAG|${GITHUB_REF_NAME}|g" \
              k8s/app/deployment.yaml | kubectl apply -f -

      - name: Deploy service
        run: kubectl apply -f k8s/app/service.yaml

      - name: Check rollout
        run: kubectl rollout status deployment/nginx-test -n app --timeout=300s