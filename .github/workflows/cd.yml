name: CD

on:
  push:
    tags:
      - 'v*'

jobs:
  build-push-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Docker login to Yandex Container Registry
        uses: docker/login-action@v3
        with:
          registry: cr.yandex
          username: json_key
          password: ${{ secrets.YC_SA_JSON_KEY }}

      - name: Build image
        run: |
          docker build -t cr.yandex/${{ secrets.YC_REGISTRY_ID }}/diplom-nginx-app:${GITHUB_REF_NAME} ./app

      - name: Push image
        run: |
          docker push cr.yandex/${{ secrets.YC_REGISTRY_ID }}/diplom-nginx-app:${GITHUB_REF_NAME}

      - name: Prepare kubeconfig
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBE_CONFIG_DATA }}" | base64 -d > ~/.kube/config
          chmod 600 ~/.kube/config

      - name: Deploy new image
        run: |
          kubectl set image deployment/diplom-nginx-app             app=cr.yandex/${{ secrets.YC_REGISTRY_ID }}/diplom-nginx-app:${GITHUB_REF_NAME}             -n app
          kubectl rollout status deployment/diplom-nginx-app -n app
